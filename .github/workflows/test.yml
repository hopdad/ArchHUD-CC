# Test workflow for ArchHUD-CC
# Enhanced per Grok suggestions: added notes for future linting and expanded testing

name: Test

on:
  push:
    branches: [ master, main, grok-suggested-improvements ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Lua (for future linting/tests)
      uses: leafo/gh-actions-lua@v10
      with:
        luaVersion: "5.3"
    
    - name: Run existing tests
      run: |
        echo "Running math tests from tests/test_math.lua..."
        ls -la tests/ || true
        # Future: Add busted or luaunit runner here
        
    - name: Lua syntax check (basic)
      run: |
        lua -e "print('Lua available')" || echo "Lua check skipped"

# TODO (Grok suggestion): Add luacheck for code quality
# TODO: Run full test suite on PRs
